<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabAstro — Laboratório Virtual de Astronomia</title>
    <style>
        /*=========================================
          VARIÁVEIS DE DESIGN (TEMA ESPACIAL)
        =========================================*/
        :root {
            --bg-space: #05070f;
            --bg-header: rgba(13, 20, 38, 0.7);
            --bg-card: rgba(19, 30, 54, 0.45);
            --bg-input: rgba(10, 16, 31, 0.8);
            
            --accent-cyan: #00f0ff;
            --accent-gold: #ffd700;
            --accent-gold-hover: #ffc400;
            
            --text-primary: #ffffff;
            --text-secondary: #b0b8c9;
            --text-dark: #05070f;
            
            --border-glass: rgba(255, 255, 255, 0.08);
            --shadow-neon: 0 0 15px rgba(0, 240, 255, 0.25);
            --radius-main: 16px;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /*=========================================
          RESET & CONFIGURAÇÃO GLOBAL
        =========================================*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-space);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.02) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /*=========================================
          CABEÇALHO (GLASSMORPHISM)
        =========================================*/
        header {
            background: var(--bg-header);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 20px 40px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            width: 180px;
            height: auto;
            transition: var(--transition-smooth);
        }

        .menu {
            display: flex;
            gap: 8px;
        }

        .menu a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: 8px;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .menu a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        /*=========================================
          BARRA DE PESQUISA
        =========================================*/
        .busca {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .busca-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .busca input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-main);
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            transition: var(--transition-smooth);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .busca input:focus {
            border-color: var(--accent-cyan);
            box-shadow: var(--shadow-neon), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .busca input::placeholder {
            color: #5a657c;
        }

        /*=========================================
          GRID DE SIMULADORES
        =========================================*/
        .simuladores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            flex-grow: 1;
            width: 100%;
        }

        /*=========================================
          CARDS (DESIGN MODERNO CORRIGIDO)
        =========================================*/
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .card-img-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
            background: #09101f;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
            opacity: 0.85;
        }

        .card:hover img {
            transform: scale(1.05);
            opacity: 1;
        }

        .card-conteudo {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 15px;
            margin-bottom: 24px;
            flex-grow: 1;
        }

        .card a {
            display: block;
            text-align: center;
            background: var(--accent-gold);
            color: var(--text-dark);
            padding: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: 12px;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
        }

        .card a:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }

        /*=========================================
          RODAPÉ
        =========================================*/
        footer {
            background: var(--bg-header);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-glass);
            text-align: center;
            padding: 24px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: auto;
        }

        /*=========================================
          MEDIA QUERIES (RESPONSIVIDADE)
        =========================================*/
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }
            .logo {
                width: 150px;
            }
        }

        @media (max-width: 600px) {
            .menu {
                width: 100%;
                flex-direction: column;
                gap: 4px;
            }
            .menu a {
                width: 100%;
                justify-content: center;
                font-size: 15px;
                padding: 12px;
            }
            .simuladores {
                padding: 20px;
                gap: 20px;
            }
            .busca input {
                border-radius: 12px;
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo LabAstro" class="logo">
        <nav class="menu">
            <a href="index.html">🛰️ Simulações</a>
            <a href="sequencia.html">📚 Sequência Didática</a>
            <a href="professor.html">👨‍🏫 Professor</a>
            <a href="materiais.html">📖 Materiais</a>
            <a href="sobre.html">ℹ️ Sobre</a>
            <a href="contato.html">📞 Contato</a>
        </nav>
    </header>

    <div class="busca">
        <div class="busca-container">
            <input type="text" id="pesquisa" placeholder="Pesquisar simulação espacial..." onkeyup="buscar()">
        </div>
    </div>

    <main>
        <section class="simuladores" id="lista">
            
            <!-- CARD 1: CANHÃO DE NEWTON -->
            <div class="card">
                <div class="card-img-wrapper">
                    <img src="canhao-newton.png" alt="Canhão de Newton">

                    <a href="canhao-newton.html">Abrir Simulação</a>
                </div>
            </div>

            <!-- CARD 2: ANÁLISE DE ÓRBITAS -->
            <div class="card">
                <div class="card-img-wrapper">
